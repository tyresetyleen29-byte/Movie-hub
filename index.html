<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Movie Hub</title>

<style>
body { font-family: Arial; background:#0f0f0f; color:white; margin:0; }
header { background:#1a1a1a; padding:15px; text-align:center; }
header h1 { color:#00ffcc; margin:0; }
#searchBar { margin-top:10px; padding:8px; width:80%; max-width:400px; border-radius:5px; border:none; }
button { margin:8px; padding:8px 12px; border:none; border-radius:5px; background:#00ffcc; font-weight:bold; cursor:pointer; }
.container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; }
.movie { background:#1e1e1e; margin:15px; padding:15px; border-radius:10px; width:200px; text-align:center; }
.movie img { width:100%; border-radius:8px; }
.rating { color:gold; }
.tag { color:red; font-size:12px; }
a { display:inline-block; margin-top:5px; padding:6px 10px; background:#00ffcc; color:black; text-decoration:none; border-radius:5px; }
</style>
</head>

<body>

<header>
<h1>🔥 Movie Hub</h1>
<input type="text" id="searchBar" placeholder="Search..." onkeyup="filterMovies()">
<br>
<button onclick="showUncut()">Uncut Only</button>
<button onclick="showAll()">Show All</button>
</header>

<div class="container">

<div class="movie" data-title="shortbus" data-uncut="true">
<img src="https://m.media-amazon.com/images/I/71jquv5zv2L._AC_SY679_.jpg">
<h3>Shortbus</h3>
<div class="rating">🔥 10/10</div>
<div class="tag">UNCUT</div>
<a href="https://www.amazon.com" target="_blank">Watch</a>
</div>

<div class="movie" data-title="love" data-uncut="true">
<img src="https://m.media-amazon.com/images/I/51F1kmc5XyL._AC_.jpg">
<h3>Love (2015)</h3>
<div class="rating">🔥 10/10</div>
<div class="tag">UNCUT</div>
<a href="https://tv.apple.com" target="_blank">Watch</a>
</div>

<div class="movie" data-title="9 songs" data-uncut="true">
<img src="https://m.media-amazon.com/images/I/71klD8pQ9sL._AC_SY679_.jpg">
<h3>9 Songs</h3>
<div class="rating">🔥 10/10</div>
<div class="tag">UNCUT</div>
<a href="https://mubi.com" target="_blank">Watch</a>
</div>

</div>

<script>
function filterMovies() {
let input = document.getElementById('searchBar').value.toLowerCase();
let movies = document.getElementsByClassName('movie');
for (let i = 0; i < movies.length; i++) {
let title = movies[i].getAttribute('data-title');
movies[i].style.display = title.includes(input) ? '' : 'none';
}
}

function showUncut() {
let movies = document.getElementsByClassName('movie');
for (let i = 0; i < movies.length; i++) {
movies[i].style.display = (movies[i].getAttribute('data-uncut') === "true") ? '' : 'none';
}
}

function showAll() {
let movies = document.getElementsByClassName('movie');
for (let i = 0; i < movies.length; i++) {
movies[i].style.display = '';
}
}
</script>

</body>
  </html>
